<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Best Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f8fafc; 
            color: #1e293b; 
        }
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 2rem; color: #1e3a5f; }
        .section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .lead-card, .managed-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 15px;
            background: #fafcff;
        }
        .btn {
            padding: 10px 20px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #059669; }
        .empty, .loading { 
            color: #64748b; 
            font-style: italic; 
            padding: 30px 0; 
            text-align: center; 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Welcome back, <span id="tradingName">Loading...</span>!</h1>
            <div>
                Plan: <strong><span id="subscriptionTier">...</span></strong><br>
                Status: <strong><span id="subscriptionStatus">...</span></strong>
            </div>
        </header>

        <div class="section">
            <h2>Pending Leads</h2>
            <div id="pendingLeadsContainer">
                <p class="loading">Loading leads...</p>
            </div>
        </div>

        <div class="section">
            <h2>Jobs You're Managing</h2>
            <div id="managedJobsContainer">
                <p class="loading">Loading your managed jobs...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            const pendingContainer = document.getElementById('pendingLeadsContainer');
            const managedContainer = document.getElementById('managedJobsContainer');

            pendingContainer.innerHTML = '<p class="loading">Loading leads...</p>';
            managedContainer.innerHTML = '<p class="loading">Loading your managed jobs...</p>';

            try {
                // User info
                const meRes = await fetch('/api/tradesperson/me', { credentials: 'include' });
                if (meRes.ok) {
                    const user = await meRes.json();
                    if (user.success) {
                        document.getElementById('tradingName').textContent = user.trading_name || 'Trader';
                        document.getElementById('subscriptionTier').textContent = (user.subscription_tier || '').toUpperCase();
                        document.getElementById('subscriptionStatus').textContent = user.subscription_status || 'Active';
                    }
                }

                // Pending Leads
                const leadsRes = await fetch('/api/tradesperson/pending-leads', { credentials: 'include' });
                const leadsData = await leadsRes.json();

                if (leadsData.success && leadsData.leads && leadsData.leads.length > 0) {
                    pendingContainer.innerHTML = '';
                    leadsData.leads.forEach(lead => {
                        const jobId = lead.id || lead.job_id || '';
                        const card = document.createElement('div');
                        card.className = 'lead-card';
                        card.innerHTML = `
                            <h3>${lead.trade_category || ''} — ${lead.job_type || ''}</h3>
                            <p><strong>Postcode:</strong> ${lead.postcode || ''}</p>
                            <p><strong>Urgency:</strong> ${lead.urgency || ''}</p>
                            <p>${lead.description || ''}</p>
                            <button class="btn" onclick="acceptLead('${jobId}')">Accept Lead</button>
                        `;
                        pendingContainer.appendChild(card);
                    });
                } else {
                    pendingContainer.innerHTML = '<p class="empty">No pending leads at the moment.</p>';
                }

                // Managed Jobs - Placeholder for now
                managedContainer.innerHTML = `
                    <p class="empty">
                        You have not accepted any jobs yet.<br>
                        <small>When you accept a lead from Pending Leads, it will move here.</small>
                    </p>
                `;

            } catch (err) {
                console.error(err);
                pendingContainer.innerHTML = '<p class="empty">Error loading leads. Please refresh.</p>';
                managedContainer.innerHTML = '<p class="empty">Error loading managed jobs.</p>';
            }
        }

        async function acceptLead(jobId) {
            if (!jobId) {
                alert("Error: Job ID is missing. Please refresh the page.");
                return;
            }
            if (!confirm(`Accept this lead (Job ${jobId})?`)) return;

            try {
                const res = await fetch('/api/tradesperson/accept-lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_id: jobId }),
                    credentials: 'include'
                });

                if (res.ok) {
                    const result = await res.json();
                    alert(result.message || `✅ Lead ${jobId} accepted successfully!`);
                    loadDashboard();   // Refresh both sections
                } else {
                    alert('Failed to accept lead');
                }
            } catch (err) {
                console.error(err);
                alert('Error accepting lead');
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
