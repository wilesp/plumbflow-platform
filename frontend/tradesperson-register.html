<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Trade Professional - Best Trade</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            color: #333;
        }
        .navbar {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .form-container {
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 70px);
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            color: white;
            padding: 24px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .content {
            padding: 40px 30px;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e5e7eb;
        }
        .step {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        .step.active { background: #1e3a5f; color: white; }
        .step.completed { background: #10b981; color: white; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e3a5f;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1e3a5f;
        }
        .btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { background: #0f172a; }
        .btn-secondary { background: #6b7280; }
        .error {
            color: #ef4444;
            margin-top: 8px;
            font-size: 0.95rem;
        }
        #card-element {
            background: white;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            min-height: 44px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BestTrade</a>
        </div>
    </nav>

    <div class="form-container">
        <div class="container">
            <div class="header">
                <h1>Join Best Trade</h1>
                <p>Start receiving quality leads today</p>
                <div class="tier-badge" id="tierBadge">BASIC PLAN</div>
            </div>

            <div class="content">
                <div class="step-indicator">
                    <div class="step active" id="step1">1</div>
                    <div class="step" id="step2">2</div>
                    <div class="step" id="step3">3</div>
                </div>

                <!-- Step 1: Business Details -->
                <form id="registrationForm" style="display: block;">
                    <h2 style="color: #1e3a5f; margin-bottom: 20px;">Business Details</h2>
                    
                    <div class="form-group">
                        <label for="businessName">Business Name *</label>
                        <input type="text" id="businessName" required>
                    </div>

                    <div class="form-group">
                        <label for="tradeType">Trade Type *</label>
                        <select id="tradeType" required>
                            <option value="">Select your trade</option>
                            <option value="plumber">Plumber</option>
                            <option value="electrician">Electrician</option>
                            <option value="builder">Builder</option>
                            <option value="gas-engineer">Gas Engineer</option>
                            <option value="heating-engineer">Heating Engineer</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fullName">Your Full Name *</label>
                        <input type="text" id="fullName" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="postcode">Base Postcode *</label>
                        <input type="text" id="postcode" required placeholder="e.g., HP1 1TT">
                    </div>

                    <button type="button" class="btn" onclick="proceedToPayment()">Continue to Payment</button>
                </form>

                <!-- Step 2: Payment -->
                <div id="paymentSection" style="display: none;">
                    <h2 style="color: #1e3a5f; margin-bottom: 20px;">Payment Details</h2>
                    <div id="card-element"></div>
                    <div id="card-errors" class="error"></div>
                    <button type="button" class="btn" id="submitPayment">Complete Registration</button>
                    <button type="button" class="btn btn-secondary" onclick="backToDetails()">← Back</button>
                </div>

                <!-- Success -->
                <div id="successSection" style="display: none; text-align:center; padding:40px 20px;">
                    <h2 style="color:#065f46;">✓ Registration Successful!</h2>
                    <p>Welcome to Best Trade!<br>Redirecting to your dashboard...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const selectedTier = urlParams.get('tier') || 'basic';
        document.getElementById('tierBadge').textContent = selectedTier.toUpperCase() + " PLAN";

        const stripe = Stripe('pk_test_51SxT8VIrb6iFFzVY9ANnw0qFooYs4gb12Tu5qPJvmzZgrceYqdmS3ldUH2QZFrN8MoHzsAxtin5uVfQlQARNPc5G00xuqSAWfi');
        const elements = stripe.elements();
        const cardElement = elements.create('card', { hidePostalCode: true });

        function proceedToPayment() {
            const form = document.getElementById('registrationForm');
            if (!form.checkValidity()) return form.reportValidity();

            document.getElementById('step1').classList.add('completed');
            document.getElementById('step2').classList.add('active');
            document.getElementById('registrationForm').style.display = 'none';
            document.getElementById('paymentSection').style.display = 'block';
            cardElement.mount('#card-element');
        }

        function backToDetails() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('paymentSection').style.display = 'none';
            document.getElementById('registrationForm').style.display = 'block';
        }

        // Final Submit - Now redirects to the REAL dashboard
        document.getElementById('submitPayment').addEventListener('click', async () => {
            const btn = document.getElementById('submitPayment');
            btn.disabled = true;

            try {
                const { paymentMethod, error } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: { name: document.getElementById('fullName').value }
                });
                if (error) throw error;

                const response = await fetch('/api/register-tradesperson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('fullName').value,
                        trading_name: document.getElementById('businessName').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        postcode: document.getElementById('postcode').value,
                        trade_category: document.getElementById('tradeType').value,
                        subscription_tier: selectedTier,
                        payment_method_id: paymentMethod.id
                    })
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.detail || result.error || 'Registration failed');

                // Success - Show message then redirect to REAL dashboard
                document.getElementById('paymentSection').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';

                setTimeout(() => {
                    window.location.replace('/tradesperson-dashboard.html');   // Uses replace() so Back button doesn't return to registration
                }, 2500);

            } catch (err) {
                document.getElementById('card-errors').textContent = err.message;
                btn.disabled = false;
            }
        });

        cardElement.on('change', (event) => {
            document.getElementById('card-errors').textContent = event.error ? event.error.message : '';
        });
    </script>
</body>
</html>
