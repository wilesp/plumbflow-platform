<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f8fafc; }
        .card { max-width: 700px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #1e3a5f; color: white; border: none; font-size: 1.1rem; cursor: pointer; }
        #message { margin-top: 20px; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registration Debug</h2>
        
        <input type="text" id="trading_name" value="Wiles Plumbers" placeholder="Trading Name">
        <input type="text" id="name" value="Paul Wiles" placeholder="Full Name">
        <input type="email" id="email" value="paul.wiles@gmail.com" placeholder="Email">
        <input type="tel" id="phone" value="07812 899000" placeholder="Phone">
        <input type="text" id="postcode" value="HP1 5TT" placeholder="Postcode">
        <select id="trade_category">
            <option value="plumber">Plumber</option>
        </select>
        <button onclick="register()">Register (Debug Mode)</button>
        
        <div id="message"></div>
    </div>

    <script>
        async function register() {
            const msg = document.getElementById('message');
            msg.style.background = '#fff3cd';
            msg.textContent = 'Sending request to /api/register-tradesperson...';

            try {
                const response = await fetch('/api/register-tradesperson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trading_name: document.getElementById('trading_name').value,
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        postcode: document.getElementById('postcode').value,
                        trade_category: document.getElementById('trade_category').value,
                        subscription_tier: 'pro'
                    })
                });

                const text = await response.text();
                console.log("Raw server response:", text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    data = { raw: text };
                }

                msg.style.background = response.ok ? '#d4edda' : '#f8d7da';
                msg.innerHTML = `Status: ${response.status}<br><pre>${JSON.stringify(data, null, 2)}</pre>`;

                if (response.ok && data.tradesperson_id) {
                    msg.innerHTML += '<br><strong>Success! Redirecting to dashboard in 2 seconds...</strong>';
                    setTimeout(() => {
                        window.location.replace('/tradesperson-dashboard.html');
                    }, 2000);
                }

            } catch (err) {
                msg.style.background = '#f8d7da';
                msg.textContent = 'Network error: ' + err.message;
            }
        }
    </script>
</body>
</html>
