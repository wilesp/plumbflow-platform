<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Tradesperson - Best Trade</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #1e3a5f;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 28px; }
        .step-indicator {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: #f8fafc;
            border-bottom: 1px solid #eee;
        }
        .step { text-align: center; margin: 0 20px; color: #64748b; }
        .step.active { color: #1e3a5f; font-weight: 600; }
        .form-container { padding: 40px; }
        .form-group { margin-bottom: 28px; }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 600; 
            color: #334155; 
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: #1e3a5f; 
        }

        /* Improved Multi-Select */
        .multi-select {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            max-height: 260px;
            overflow-y: auto;
            background: #f8fafc;
            display: grid;
            grid-template-columns: 1fr 1fr;   /* Two columns for better layout */
            gap: 8px 20px;
        }
        .multi-select label {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            margin: 0;
            cursor: pointer;
            font-size: 0.98rem;
        }
        .multi-select input[type="checkbox"] {
            margin-right: 10px;
            accent-color: #1e3a5f;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .success-section {
            display: none;
            text-align: center;
            padding: 40px 20px;
            background: #f0fdf4;
            color: #166534;
        }
        .error { color: #ef4444; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Join as a Tradesperson</h1>
            <p>Get more jobs in your local area</p>
        </div>

        <div class="step-indicator">
            <div class="step active" id="step1Indicator">1. Business Details</div>
            <div class="step" id="step2Indicator">2. Payment</div>
        </div>

        <!-- Step 1 -->
        <div class="form-container" id="step1">
            <form id="registerForm">
                <div class="form-group">
                    <label>Trading / Business Name <span style="color:red">*</span></label>
                    <input type="text" id="trading_name" required placeholder="e.g. Test Plumber Ltd">
                </div>
                <div class="form-group">
                    <label>Contact Name <span style="color:red">*</span></label>
                    <input type="text" id="contact_name" required placeholder="e.g. Dan Smith">
                </div>
                <div class="form-group">
                    <label>Trade Categories <span style="color:red">*</span> (select all that apply)</label>
                    <div class="multi-select" id="trade_categories">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address <span style="color:red">*</span></label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number <span style="color:red">*</span></label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>Postcode <span style="color:red">*</span></label>
                    <input type="text" id="postcode" required style="text-transform: uppercase;">
                </div>

                <button type="button" onclick="goToPayment()" class="submit-btn" id="continueBtn">
                    Continue to Payment
                </button>
            </form>
        </div>

        <!-- Step 2: Payment -->
        <div class="form-container" id="step2" style="display:none;">
            <h2 style="text-align:center; margin-bottom:20px;">Complete Payment</h2>
            <div id="card-element" style="margin-bottom:20px;"></div>
            <div id="card-errors" class="error"></div>

            <button onclick="createSubscription()" class="submit-btn" id="payButton">
                Pay & Complete Registration
            </button>
        </div>

        <!-- Success -->
        <div class="success-section" id="successSection">
            <h2>✅ Registration & Payment Successful!</h2>
            <p>Your account is now active and ready to receive jobs from all your selected trades.</p>
            <button onclick="window.location.href='/'" class="submit-btn">
                Return to Home Page
            </button>
        </div>
    </div>

    <script>
        let stripe = Stripe('pk_test_51SxT8VIrb6iFFzVY9ANnw0qFooYs4gb12Tu5qPJvmzZgrceYqdmS3ldUH2QZFrN8MoHzsAxtin5uVfQlQARNPc5G00xuqSAWfi');
        let elements;
        let card;
        let tradespersonId;
        let currentTier = 'pro';

        const tradeOptions = [
            {value: "plumber", label: "Plumber"},
            {value: "electrician", label: "Electrician"},
            {value: "gas-engineer", label: "Gas Engineer"},
            {value: "heating-engineer", label: "Heating Engineer"},
            {value: "boiler-installer", label: "Boiler Installer"},
            {value: "hvac", label: "HVAC Engineer"},
            {value: "builder", label: "Builder"},
            {value: "carpenter", label: "Carpenter"},
            {value: "roofer", label: "Roofer"},
            {value: "plasterer", label: "Plasterer"},
            {value: "painter-decorator", label: "Painter & Decorator"},
            {value: "tiler", label: "Tiler"},
            {value: "kitchen-fitter", label: "Kitchen Fitter"},
            {value: "bathroom-fitter", label: "Bathroom Fitter"},
            {value: "flooring", label: "Flooring Specialist"},
            {value: "window-fitter", label: "Window Fitter"},
            {value: "handyman", label: "Handyman"},
            {value: "landscaper", label: "Landscaper / Gardener"},
            {value: "drainage", label: "Drainage Specialist"},
            {value: "locksmith", label: "Locksmith"}
        ];

        function populateTradeOptions() {
            const container = document.getElementById('trade_categories');
            container.innerHTML = '';
            tradeOptions.forEach(trade => {
                const label = document.createElement('label');
                label.innerHTML = `
                    <input type="checkbox" name="trade_categories" value="${trade.value}"> ${trade.label}
                `;
                container.appendChild(label);
            });
        }

        async function goToPayment() {
            const selectedTrades = Array.from(document.querySelectorAll('input[name="trade_categories"]:checked'))
                                      .map(cb => cb.value);

            if (selectedTrades.length === 0) {
                alert("Please select at least one trade category");
                return;
            }

            const form = document.getElementById('registerForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('step1Indicator').classList.remove('active');
            document.getElementById('step2Indicator').classList.add('active');

            elements = stripe.elements();
            card = elements.create('card', { hidePostalCode: true });
            card.mount('#card-element');
        }

        async function createSubscription() {
            const payButton = document.getElementById('payButton');
            payButton.disabled = true;
            payButton.textContent = 'Processing...';

            try {
                const selectedTrades = Array.from(document.querySelectorAll('input[name="trade_categories"]:checked'))
                                          .map(cb => cb.value);

                const regData = {
                    trading_name: document.getElementById('trading_name').value.trim(),
                    contact_name: document.getElementById('contact_name').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    postcode: document.getElementById('postcode').value.trim().toUpperCase(),
                    trade_categories: selectedTrades,
                    subscription_tier: currentTier
                };

                const regRes = await fetch('/api/register-tradesperson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(regData)
                });

                const regResult = await regRes.json();
                if (!regRes.ok || !regResult.success) {
                    throw new Error(regResult.detail || 'Registration failed');
                }

                tradespersonId = regResult.tradesperson_id;

                const { paymentMethod, error } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: card
                });

                if (error) throw error;

                const subRes = await fetch('/api/subscription/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tradesperson_id: tradespersonId,
                        price_id: getPriceId(currentTier),
                        tier: currentTier
                    })
                });

                const subResult = await subRes.json();
                if (!subRes.ok) throw new Error(subResult.detail || 'Subscription failed');

                const confirmRes = await stripe.confirmCardPayment(subResult.clientSecret, {
                    payment_method: paymentMethod.id
                });

                if (confirmRes.error) throw confirmRes.error;

                document.getElementById('step2').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';

            } catch (err) {
                console.error(err);
                alert('Error: ' + err.message);
                payButton.disabled = false;
                payButton.textContent = 'Pay & Complete Registration';
            }
        }

        function getPriceId(tier) {
            const prices = {
                'basic': 'price_1T9RVDIrb6iFFzVYMd2Uslrv',
                'pro': 'price_1T9RpaIrb6iFFzVYCFezjAHq',
                'premium': 'price_1T9RZAIrb6iFFzVYu8p8tdgb'
            };
            return prices[tier] || prices['pro'];
        }

        window.onload = () => {
            populateTradeOptions();
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('tier')) currentTier = urlParams.get('tier');
        };
    </script>
</body>
</html>
