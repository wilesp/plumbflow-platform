<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Tradesperson - Best Trade</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #1e3a5f;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 28px; }
        .step-indicator {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: #f8fafc;
            border-bottom: 1px solid #eee;
        }
        .step { text-align: center; margin: 0 20px; color: #64748b; }
        .step.active { color: #1e3a5f; font-weight: 600; }
        .form-container { padding: 40px; }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #1e3a5f;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .success-section {
            display: none;
            text-align: center;
            padding: 40px 20px;
            background: #f0fdf4;
            color: #166534;
        }
        .close-btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Join as a Tradesperson</h1>
            <p>Get more jobs in your local area</p>
        </div>

        <div class="step-indicator">
            <div class="step active">1. Business Details</div>
            <div class="step">2. Payment</div>
        </div>

        <div class="form-container" id="step1">
            <form id="registerForm">
                <div class="form-group">
                    <label>Trading / Business Name <span style="color:red">*</span></label>
                    <input type="text" id="trading_name" required placeholder="e.g. Wiles Plumbing Ltd">
                </div>

                <div class="form-group">
                    <label>Contact Name <span style="color:red">*</span></label>
                    <input type="text" id="contact_name" required placeholder="e.g. Dave Smith">
                </div>

                <div class="form-group">
                    <label>Trade Category <span style="color:red">*</span></label>
                    <select id="trade_category" name="trade_category" required>
                        <option value="">Select your main trade...</option>
                        
                        <optgroup label="Emergency & Core Trades">
                            <option value="plumber">Plumber</option>
                            <option value="electrician">Electrician</option>
                            <option value="gas-engineer">Gas Engineer</option>
                            <option value="heating-engineer">Heating Engineer</option>
                            <option value="boiler-installer">Boiler Installer</option>
                            <option value="drainage">Drainage Specialist</option>
                            <option value="locksmith">Locksmith</option>
                        </optgroup>

                        <optgroup label="Building & Construction">
                            <option value="builder">Builder</option>
                            <option value="carpenter">Carpenter</option>
                            <option value="roofer">Roofer</option>
                            <option value="plasterer">Plasterer</option>
                        </optgroup>

                        <optgroup label="Interior & Finishing">
                            <option value="painter-decorator">Painter & Decorator</option>
                            <option value="tiler">Tiler</option>
                            <option value="kitchen-fitter">Kitchen Fitter</option>
                            <option value="bathroom-fitter">Bathroom Fitter</option>
                            <option value="flooring">Flooring Specialist</option>
                            <option value="window-fitter">Window Fitter</option>
                        </optgroup>

                        <optgroup label="Other Services">
                            <option value="handyman">Handyman</option>
                            <option value="landscaper">Landscaper / Gardener</option>
                            <option value="hvac">HVAC Engineer</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label>Email Address <span style="color:red">*</span></label>
                    <input type="email" id="email" required placeholder="e.g. dave@wilestrade.co.uk">
                </div>

                <div class="form-group">
                    <label>Phone Number <span style="color:red">*</span></label>
                    <input type="tel" id="phone" required placeholder="e.g. 07812 345678">
                </div>

                <div class="form-group">
                    <label>Postcode <span style="color:red">*</span></label>
                    <input type="text" id="postcode" required placeholder="e.g. HP1 1TT" style="text-transform: uppercase;">
                </div>

                <button type="button" onclick="goToPayment()" class="submit-btn" id="continueBtn">
                    Continue to Payment
                </button>
            </form>
        </div>

        <!-- Step 2: Payment -->
        <div class="form-container" id="step2" style="display:none;">
            <h2 style="text-align:center; margin-bottom:20px;">Complete Registration & Pay</h2>
            <div id="card-element"></div>
            <div id="card-errors" style="color:red; margin-top:10px;"></div>

            <button onclick="createSubscription()" class="submit-btn" id="payButton" style="margin-top:30px;">
                Make Payment & Complete Registration
            </button>
        </div>

        <!-- Success Section -->
        <div class="success-section" id="successSection">
            <h2>✅ Registration Successful!</h2>
            <p id="successMessage">Your subscription has been activated.</p>
            <button onclick="window.location.href='/'" class="close-btn">
                Close Window
            </button>
        </div>
    </div>

    <script>
        let stripe = Stripe('pk_test_YOUR_TEST_PUBLISHABLE_KEY_HERE'); // ← Replace with your test key
        let elements;
        let cardElement;
        let currentTier = 'pro';

        async function goToPayment() {
            const form = document.getElementById('registerForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';

            // Initialize Stripe Elements
            elements = stripe.elements();
            cardElement = elements.create('card', { 
                hidePostalCode: true   // UK business - no zip code
            });
            cardElement.mount('#card-element');
        }

        async function createSubscription() {
            const payButton = document.getElementById('payButton');
            payButton.disabled = true;
            payButton.textContent = 'Processing...';

            try {
                // Step 1: Register tradesperson
                const regData = {
                    trading_name: document.getElementById('trading_name').value,
                    contact_name: document.getElementById('contact_name').value,
                    trade_category: document.getElementById('trade_category').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    postcode: document.getElementById('postcode').value.toUpperCase(),
                    subscription_tier: currentTier
                };

                const regResponse = await fetch('/api/register-tradesperson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(regData)
                });

                const regResult = await regResponse.json();
                if (!regResponse.ok) throw new Error(regResult.detail || 'Registration failed');

                const tradesperson_id = regResult.tradesperson_id;

                // Step 2: Create Stripe Payment Method
                const { paymentMethod, error } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                });

                if (error) throw error;

                // Step 3: Create Subscription
                const subResponse = await fetch('/api/subscription/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tradesperson_id: tradesperson_id,
                        tier: currentTier,
                        payment_method_id: paymentMethod.id
                    })
                });

                if (!subResponse.ok) {
                    const err = await subResponse.json();
                    throw new Error(err.detail || 'Subscription failed');
                }

                // Success
                document.getElementById('step2').style.display = 'none';
                const successSection = document.getElementById('successSection');
                successSection.style.display = 'block';

            } catch (err) {
                console.error(err);
                alert('Error: ' + err.message);
                payButton.disabled = false;
                payButton.textContent = 'Make Payment & Complete Registration';
            }
        }

        // Get tier from URL if coming from pricing page
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('tier')) {
                currentTier = urlParams.get('tier');
            }
        };
    </script>
</body>
</html>
