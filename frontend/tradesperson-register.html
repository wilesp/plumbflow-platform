<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Tradesperson - Best Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            background: #1e3a5f;
            color: white;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0f172a; }
        #message { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Register Test</h2>
        
        <input type="text" id="trading_name" value="Wiles Plumbers" placeholder="Trading Name">
        <input type="text" id="name" value="Paul Wiles" placeholder="Full Name">
        <input type="email" id="email" value="paul.wiles@gmail.com" placeholder="Email">
        <input type="tel" id="phone" value="07812 899000" placeholder="Phone">
        <input type="text" id="postcode" value="HP1 5TT" placeholder="Postcode">
        <select id="trade_category">
            <option value="plumber">Plumber</option>
        </select>
        
        <button onclick="register()">Register & Go to Dashboard</button>
        
        <div id="message"></div>
    </div>

    <script>
        async function register() {
            const msg = document.getElementById('message');
            msg.style.background = '#fff3cd';
            msg.textContent = 'Registering...';

            try {
                const response = await fetch('/api/register-tradesperson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trading_name: document.getElementById('trading_name').value,
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        postcode: document.getElementById('postcode').value,
                        trade_category: document.getElementById('trade_category').value,
                        subscription_tier: 'pro'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    msg.style.background = '#d4edda';
                    msg.innerHTML = '✅ Registration successful!<br>Redirecting to dashboard...';
                    
                    setTimeout(() => {
                        window.location.replace('/tradesperson-dashboard.html');
                    }, 1500);
                } else {
                    msg.style.background = '#f8d7da';
                    msg.textContent = 'Error: ' + (data.detail || 'Unknown error');
                }
            } catch (err) {
                msg.style.background = '#f8d7da';
                msg.textContent = 'Network error: ' + err.message;
            }
        }
    </script>
</body>
</html>
