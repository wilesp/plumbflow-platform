<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Tradesperson - Best Trade</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #1e3a5f;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 28px; }
        .step-indicator {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: #f8fafc;
            border-bottom: 1px solid #eee;
        }
        .step { text-align: center; margin: 0 20px; color: #64748b; }
        .step.active { color: #1e3a5f; font-weight: 600; }
        .form-container { padding: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #0f172a; }
        .success-section {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .success-section h2 { color: #10b981; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Join Best Trade</h1>
            <p>Start receiving customer jobs today</p>
        </div>

        <div class="step-indicator">
            <div class="step active">1. Business Details</div>
            <div class="step">2. Payment</div>
        </div>

        <div class="form-container">
            <!-- Step 1 -->
            <div id="step1">
                <div class="form-group">
                    <label>Business / Trading Name *</label>
                    <input type="text" id="trading_name" placeholder="e.g. Wiles Plumbers">
                </div>
                <div class="form-group">
                    <label>Your Full Name *</label>
                    <input type="text" id="name" placeholder="Paul Wiles">
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" placeholder="paul.wiles@gmail.com">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" placeholder="07812 899000">
                </div>
                <div class="form-group">
                    <label>Postcode *</label>
                    <input type="text" id="postcode" placeholder="HP1 5TT" style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label>Trade Category *</label>
                    <select id="trade_category">
                        <option value="">Select your trade</option>
                        <option value="plumber">Plumber</option>
                        <option value="electrician">Electrician</option>
                        <option value="carpenter">Carpenter</option>
                        <option value="gas engineer">Gas Engineer</option>
                        <option value="builder">Builder</option>
                    </select>
                </div>
                <button onclick="nextStep()">Continue to Payment</button>
            </div>

            <!-- Step 2: Payment -->
            <div id="step2" style="display: none;">
                <div id="card-element" style="border: 2px solid #e5e7eb; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>
                <button onclick="createSubscription()">Complete Registration & Pay</button>
                <p style="text-align: center; margin-top: 15px; color: #64748b; font-size: 0.9rem;">
                    Test Mode • Use card 4242 4242 4242 4242
                </p>
            </div>

            <!-- Success -->
            <div id="successSection" class="success-section">
                <div id="successMessage"></div>
            </div>
        </div>
    </div>

    <script>
        const stripe = Stripe('pk_test_YOUR_STRIPE_PUBLISHABLE_KEY'); // Keep test key
        let elements, cardElement;
        let currentTier = 'pro';

        function initializeStripe() {
            elements = stripe.elements();
            cardElement = elements.create('card', { hidePostalCode: true });
            cardElement.mount('#card-element');
        }

        function nextStep() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            initializeStripe();
        }

        async function createSubscription() {
            const button = document.querySelector('#step2 button');
            button.disabled = true;
            button.textContent = 'Processing...';

            try {
                // 1. Register
                const regResponse = await fetch('/api/register-tradesperson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trading_name: document.getElementById('trading_name').value.trim(),
                        name: document.getElementById('name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        phone: document.getElementById('phone').value.trim(),
                        postcode: document.getElementById('postcode').value.trim().toUpperCase(),
                        trade_category: document.getElementById('trade_category').value,
                        subscription_tier: currentTier
                    })
                });

                const regText = await regResponse.text();
                console.log("Raw registration response:", regText);

                if (!regResponse.ok) {
                    throw new Error('Registration failed: ' + regText);
                }

                const regData = JSON.parse(regText);

                // Safe access to tradesperson_id
                const tradesperson_id = regData.tradesperson_id || regData.id;

                if (!tradesperson_id) {
                    throw new Error('No tradesperson_id in response. Got: ' + JSON.stringify(regData));
                }

                // 2. Create Payment Method
                const { paymentMethod } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement
                });

                // 3. Create Subscription
                const subResponse = await fetch('/api/subscription/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tradesperson_id: tradesperson_id,
                        tier: currentTier,
                        payment_method_id: paymentMethod.id
                    })
                });

                if (!subResponse.ok) {
                    const errText = await subResponse.text();
                    throw new Error('Subscription failed: ' + errText);
                }

                // Success
                const successSection = document.getElementById('successSection');
                const successMessage = document.getElementById('successMessage');

                successSection.style.display = 'block';
                successMessage.innerHTML = `
                    <h2>✅ Registration Successful!</h2>
                    <p>Your ${currentTier.toUpperCase()} subscription has been activated.</p>
                    <p>You will now be redirected to your personal dashboard...</p>
                `;

                setTimeout(() => {
                    window.location.replace('/tradesperson-dashboard.html');
                }, 2500);

            } catch (err) {
                console.error(err);
                alert('Error during registration: ' + err.message);
                button.disabled = false;
                button.textContent = 'Complete Registration & Pay';
            }
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('tier')) currentTier = urlParams.get('tier');
        };
    </script>
</body>
</html>
