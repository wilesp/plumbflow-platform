<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Trade Professional - Best Trade</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* Your full CSS remains exactly the same - I kept it all */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); min-height: 100vh; }
        /* ... (all your existing styles are unchanged) ... */
    </style>
</head>
<body>
    <!-- Navigation (unchanged) -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-tick">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                </span>
                BestTrade
            </a>
        </div>
    </nav>

    <div class="form-container">
        <div class="container">
            <div class="header">
                <h1>Join Best Trade</h1>
                <p>Start receiving quality leads today</p>
                <div class="tier-badge" id="tierBadge">BASIC PLAN</div>
            </div>

            <div class="content">
                <div class="step-indicator">
                    <div class="step active" id="step1">1</div>
                    <div class="step" id="step2">2</div>
                    <div class="step" id="step3">3</div>
                </div>

                <div class="plan-summary" id="planSummary">
                    <h3>Your Selected Plan</h3>
                    <div class="plan-details"><span>Plan:</span><strong id="planName">Basic</strong></div>
                    <div class="plan-details"><span>Coverage:</span><span id="planRadius">10 mile radius</span></div>
                    <div class="plan-details"><span>Price:</span><span class="plan-price" id="planPrice">£20/month</span></div>
                </div>

                <!-- Step 1: Business Details (Terms checkbox removed) -->
                <form id="registrationForm" style="display: block;">
                    <h2 style="color: #1e3a5f; margin-bottom: 20px;">Business Details</h2>
                    
                    <div class="form-group">
                        <label for="businessName">Business Name *</label>
                        <input type="text" id="businessName" required>
                    </div>

                    <div class="form-group">
                        <label for="tradeType">Trade Type *</label>
                        <select id="tradeType" required>
                            <option value="">Select your trade</option>
                            <option value="plumber">Plumber</option>
                            <option value="electrician">Electrician</option>
                            <!-- Add your other options here -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fullName">Your Full Name *</label>
                        <input type="text" id="fullName" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="postcode">Base Postcode *</label>
                        <input type="text" id="postcode" required placeholder="e.g., SW1A 1AA">
                    </div>

                    <div class="form-group">
                        <label for="experience">Years of Experience</label>
                        <input type="number" id="experience" min="0" max="50">
                    </div>

                    <div class="form-group">
                        <label for="qualifications">Qualifications / Certifications</label>
                        <textarea id="qualifications" placeholder="List any relevant qualifications or certifications"></textarea>
                    </div>

                    <button type="button" class="btn" onclick="proceedToPayment()">Continue to Payment</button>
                </form>

                <!-- Payment Section (unchanged) -->
                <div id="paymentSection" style="display: none;">
                    <h2 style="color: #1e3a5f; margin-bottom: 20px;">Payment Details</h2>
                    <div id="card-element"></div>
                    <div id="card-errors" class="error"></div>
                    <button type="button" class="btn" id="submitPayment" style="margin-top: 20px;">Complete Registration</button>
                    <button type="button" class="btn btn-secondary" onclick="backToDetails()">← Back</button>
                </div>

                <!-- Success & Loading sections unchanged -->
                <div id="successSection" style="display: none;"> ... </div>
                <div id="loadingSection" style="display: none;"> ... </div>
            </div>
        </div>
    </div>

    <script>
        // Your existing script (with one small fix in the register payload)
        const urlParams = new URLSearchParams(window.location.search);
        const selectedTier = urlParams.get('tier') || sessionStorage.getItem('selectedTier') || 'basic';

        const plans = { /* your plans object */ };

        const plan = plans[selectedTier];
        document.getElementById('tierBadge').textContent = `${plan.name.toUpperCase()} PLAN`;
        document.getElementById('planName').textContent = plan.name;
        document.getElementById('planRadius').textContent = plan.radius;
        document.getElementById('planPrice').textContent = plan.price;

        const stripe = Stripe('pk_test_...');   // ← keep your test key
        const elements = stripe.elements();
        const cardElement = elements.create('card', { hidePostalCode: true });

        function proceedToPayment() {
            const form = document.getElementById('registrationForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            document.getElementById('step1').classList.add('completed');
            document.getElementById('step2').classList.add('active');
            document.getElementById('registrationForm').style.display = 'none';
            document.getElementById('paymentSection').style.display = 'block';
            cardElement.mount('#card-element');
        }

        function backToDetails() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('paymentSection').style.display = 'none';
            document.getElementById('registrationForm').style.display = 'block';
        }

        // FIXED: Updated payload to match likely table columns
        document.getElementById('submitPayment').addEventListener('click', async () => {
            const submitButton = document.getElementById('submitPayment');
            submitButton.disabled = true;

            try {
                document.getElementById('paymentSection').style.display = 'none';
                document.getElementById('loadingSection').style.display = 'block';

                const { paymentMethod, error } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: {
                        name: document.getElementById('fullName').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        address: { postal_code: document.getElementById('postcode').value, country: 'GB' }
                    }
                });

                if (error) throw error;

                // Register tradesperson - FIXED field names
                const registerResponse = await fetch('/api/register-tradesperson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        business_name: document.getElementById('businessName').value,
                        full_name: document.getElementById('fullName').value,        // ← changed from contact_name
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        postcode: document.getElementById('postcode').value,
                        trade_category: document.getElementById('tradeType').value,
                        subscription_tier: selectedTier
                    })
                });

                if (!registerResponse.ok) {
                    const err = await registerResponse.json();
                    throw new Error(err.error || err.detail || 'Registration failed');
                }

                const registerResult = await registerResponse.json();
                const tradesperson_id = registerResult.tradesperson_id;

                // Then create subscription (your existing code)
                // ... rest of your subscription code remains the same

            } catch (error) {
                console.error(error);
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('paymentSection').style.display = 'block';
                document.getElementById('card-errors').textContent = error.message || 'Registration failed. Please try again.';
                submitButton.disabled = false;
            }
        });

        cardElement.on('change', (event) => {
            document.getElementById('card-errors').textContent = event.error ? event.error.message : '';
        });
    </script>
</body>
</html>
