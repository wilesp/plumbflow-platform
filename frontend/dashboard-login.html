<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login - Best Trade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-tick {
            width: 40px;
            height: 40px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-tick svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .login-content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #2d4a70;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.3);
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #059669;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #dc2626;
        }

        .info-text {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 20px;
            line-height: 1.6;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #1e3a5f;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #1e3a5f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <span class="logo-tick">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                </span>
                <span class="logo-text">BestTrade</span>
            </div>
            <h1>Tradesperson Login</h1>
            <p>Enter your email to access your dashboard</p>
        </div>

        <div class="login-content">
            <div id="successMessage" class="message message-success"></div>
            <div id="errorMessage" class="message message-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Send Link
                </button>
            </form>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: #64748b;">Sending email...</p>
            </div>

            <div class="info-text">
                We'll send a secure login link to your email.<br>
                Click the link to access your dashboard.
            </div>

            <div class="back-link">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            const email = document.getElementById('email').value.trim();

            if (!email) {
                errorMessage.textContent = 'Please enter your email address';
                errorMessage.style.display = 'block';
                return;
            }

            // Show loading, hide form
            form.style.display = 'none';
            loadingIndicator.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/send-magic-link', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                // Hide loading
                loadingIndicator.style.display = 'none';

                if (response.ok && result.success) {
                    // Show success message
                    successMessage.textContent = '✓ ' + result.message;
                    successMessage.style.display = 'block';

                    // Clear form
                    form.reset();
                } else {
                    // Show error
                    form.style.display = 'block';
                    errorMessage.textContent = '❌ ' + (result.detail || result.message || 'Failed to send login link. Please try again.');
                    errorMessage.style.display = 'block';
                    submitBtn.disabled = false;
                }

            } catch (error) {
                console.error('Login error:', error);
                loadingIndicator.style.display = 'none';
                form.style.display = 'block';
                errorMessage.textContent = '❌ Network error. Please check your connection and try again.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
