<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Sign In - Best Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #1e3a5f; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        button:hover { background: #0f172a; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Trade Sign In</h1>
        <p>Enter your email to receive a magic login link</p>
        
        <input type="email" id="email" placeholder="your@email.com" style="margin-bottom:20px;">
        
        <button onclick="sendMagicLink()">Send Magic Link</button>
        
        <p style="margin-top:30px; font-size:0.9rem; color:#666;">
            We'll email you a secure link to access your dashboard.
        </p>
    </div>

    <script>
        async function sendMagicLink() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                alert("Please enter your email");
                return;
            }

            try {
                const response = await fetch('/api/auth/send-magic-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();
                alert(result.message || "Check your email for the login link!");
            } catch (err) {
                alert("Error sending link. Please try again.");
            }
        }
    </script>
</body>
</html>
