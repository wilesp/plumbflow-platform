<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Best Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #1e3a5f; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 30px; line-height: 1.5; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0f172a; }
        .message {
            margin-top: 20px;
            font-size: 0.95rem;
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Trade Sign In</h1>
        <p>Enter your registered email</p>
        
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        <button onclick="signIn()">Sign In</button>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        async function signIn() {
            const email = document.getElementById('email').value.trim();
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = '';

            if (!email) {
                messageDiv.style.color = '#ef4444';
                messageDiv.textContent = 'Please enter your email address';
                return;
            }

            try {
                // For testing: directly create session and go to dashboard
                const response = await fetch('/api/auth/send-magic-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (response.ok) {
                    messageDiv.style.color = '#10b981';
                    messageDiv.textContent = 'Signing you in...';

                    // Simulate successful magic link verification and redirect to dashboard
                    setTimeout(() => {
                        window.location.replace('/tradesperson-dashboard.html');
                    }, 1500);
                } else {
                    messageDiv.style.color = '#ef4444';
                    messageDiv.textContent = result.detail || 'Email not found.';
                }
            } catch (err) {
                messageDiv.style.color = '#ef4444';
                messageDiv.textContent = 'Unable to sign in. Please try again.';
            }
        }
    </script>
</body>
</html>
