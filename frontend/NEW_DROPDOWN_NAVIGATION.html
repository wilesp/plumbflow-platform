<style>

    .logo-tick {

    .nav-menu {

        gap: 5px;

        list-style: none;
    }
    
    .nav-item {
        position: relative;
    }
    
    .nav-link {
        color: #64748b;

        gap: 6px;

        border-radius: 6px;

    }

    }
    
    /* Dropdown Arrow */
    .dropdown-arrow {
        width: 12px;
        height: 12px;
        fill: currentColor;
        transition: transform 0.2s;
    }
    
    .nav-item:hover .dropdown-arrow {
        transform: rotate(180deg);
    }
    
    /* Dropdown Menu */
    .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        background: white;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        border-radius: 8px;
        min-width: 220px;
        padding: 8px 0;
        margin-top: 8px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.2s;
        z-index: 1000;
    }
    
    .nav-item:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
    
    .dropdown-link {
        display: block;
        padding: 12px 20px;
        color: #64748b;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
    }
    
    .dropdown-link:hover {
        background: #f8fafc;
        color: #1e3a5f;
        padding-left: 24px;
    }
    
    .dropdown-link.primary {
        color: #1e3a5f;
        font-weight: 600;
    }
    
    .dropdown-divider {
        height: 1px;
        background: #e2e8f0;
        margin: 8px 0;
    }
    
    /* Sign In Button */
    .nav-btn {
        background: #1e3a5f;
        color: white !important;
        padding: 10px 24px;
        border-radius: 6px;
        transition: all 0.3s;
        margin-left: 10px;
    }
    
    .nav-btn:hover {
        background: #2d4a70;
        transform: translateY(-1px);
    }
    
    /* Mobile Menu Toggle */
    .mobile-menu-toggle {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
    }
    
    .mobile-menu-toggle span {
        display: block;
        width: 24px;
        height: 3px;
        background: #1e3a5f;
        margin: 5px 0;
        transition: 0.3s;
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
        .nav-container {
            padding: 12px 15px;
        }
        
        .logo {
            font-size: 18px;
        }
        
        .logo-tick {
            width: 28px;
            height: 28px;
        }
        
        .logo-tick svg {
            width: 16px;
            height: 16px;
        }
        
        .mobile-menu-toggle {
            display: block;
        }
        
        .nav-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            flex-direction: column;
            gap: 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        
        .nav-menu.active {
            max-height: 600px;
            padding: 10px 0;
        }
        
        .nav-item {
            width: 100%;
        }
        
        .nav-link {
            padding: 14px 20px;
            width: 100%;
        }
        
        .dropdown-menu {
            position: static;
            box-shadow: none;
            opacity: 1;
            visibility: visible;
            transform: none;
            display: none;
            padding: 0 0 0 20px;
        }
        
        .nav-item:hover .dropdown-menu {
            display: block;
        }
        
        .nav-btn {
            margin: 10px 20px;
            text-align: center;
        }
    }
</style>

<script>
    function toggleMobileMenu() {
        const navMenu = document.getElementById('navMenu');
        navMenu.classList.toggle('active');
    }
    
    // Close mobile menu when clicking outside
    document.addEventListener('click', function(event) {
        const navMenu = document.getElementById('navMenu');
        const toggle = document.querySelector('.mobile-menu-toggle');
        
        if (!event.target.closest('.nav-container')) {
            navMenu.classList.remove('active');
        }
    });
</script>
