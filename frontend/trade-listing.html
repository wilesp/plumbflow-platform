<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured - Best Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .header {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #1e3a5f;
            font-size: 2.8rem;
        }
        .ad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }
        .ad-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .ad-card:hover {
            transform: translateY(-5px);
        }
        .ad-card h3 {
            color: #1e3a5f;
            margin-bottom: 10px;
        }
        .ad-card p {
            color: #475569;
            margin-bottom: 15px;
        }
        .postcode {
            font-weight: 600;
            color: #1e3a5f;
        }
        .no-ads {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Homepage</a>

        <div class="header">
            <h1 id="page-title">Featured Tradespeople</h1>
            <p id="subtitle">Trusted companies who have paid to be featured</p>
        </div>

        <div class="ad-grid" id="ad-grid">
            <!-- Ads will be loaded here -->
        </div>
    </div>

    <script>
        // Get category from URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category') || 'plumber';

        // Nice titles
        const titleMap = {
            'plumber': 'Featured Plumbers',
            'electrician': 'Featured Electricians',
            'builder': 'Featured Builders',
            'tiler': 'Featured Tilers',
            'roofer': 'Featured Roofers',
            'carpenter': 'Featured Carpenters',
            'painter': 'Featured Painters & Decorators',
            'heating': 'Featured Heating Engineers'
        };

        document.getElementById('page-title').textContent = titleMap[category] || 'Featured Tradespeople';

        async function loadAds() {
            try {
                const res = await fetch(`/api/featured-ads/${category}`);
                const data = await res.json();

                const container = document.getElementById('ad-grid');
                container.innerHTML = '';

                if (!data.ads || data.ads.length === 0) {
                    container.innerHTML = `
                        <div class="no-ads">
                            <h2>No featured ads yet in this category</h2>
                            <p>Be the first to get featured! <a href="/tradesperson-dashboard.html">Go to your dashboard</a></p>
                        </div>
                    `;
                    return;
                }

                data.ads.forEach(ad => {
                    const card = document.createElement('div');
                    card.className = 'ad-card';
                    card.innerHTML = `
                        <h3>${ad.company_name || 'Professional Trade Company'}</h3>
                        <p>${ad.short_description || 'Reliable and trusted local service provider.'}</p>
                        ${ad.postcode_area ? `<p class="postcode">📍 Serving ${ad.postcode_area}</p>` : ''}
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('ad-grid').innerHTML = `
                    <div class="no-ads">
                        <p>Sorry, we couldn't load the featured ads at the moment.</p>
                    </div>
                `;
            }
        }

        window.onload = loadAds;
    </script>
</body>
</html>
