<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured [Trade] - Best Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #333;
        }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .header {
            background: #1e3a5f;
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 40px;
        }
        .ad-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .ad-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 8px;
        }
        .ad-desc {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .ad-postcode {
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">Featured Tradespeople</h1>
            <p id="pageSubtitle">Professionals who have paid to be featured</p>
        </div>

        <div id="adsContainer">
            Loading featured professionals...
        </div>
    </div>

    <script>
        // Get category from URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category') || 'tiler';

        const titleMap = {
            "plumber": "Featured Plumbers",
            "electrician": "Featured Electricians",
            "gas-engineer": "Featured Gas Engineers",
            "tiler": "Featured Tilers",
            "roofer": "Featured Roofers",
            "builder": "Featured Builders",
            "carpenter": "Featured Carpenters",
            "plasterer": "Featured Plasterers",
            "painter-decorator": "Featured Painters & Decorators"
        };

        document.getElementById('pageTitle').textContent = titleMap[category] || "Featured Tradespeople";

        async function loadAds() {
            try {
                const res = await fetch(`/api/featured-ads/${category}`);
                const data = await res.json();

                const container = document.getElementById('adsContainer');
                if (data.ads && data.ads.length > 0) {
                    container.innerHTML = data.ads.map(ad => `
                        <div class="ad-card">
                            <div class="ad-name">${ad.company_name}</div>
                            <div class="ad-desc">${ad.short_description}</div>
                            <div class="ad-postcode">📍 ${ad.postcode_area || 'UK'}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<p style="text-align:center; color:#64748b; padding:60px;">No featured ${category}s at the moment.<br>Be the first to advertise!</p>`;
                }
            } catch (e) {
                document.getElementById('adsContainer').innerHTML = `<p style="color:red;">Error loading ads. Please try again later.</p>`;
            }
        }

        window.onload = loadAds;
    </script>
</body>
</html>
