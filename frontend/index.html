<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Trade - UK's #1 Trade Marketplace | Find Trusted Tradespeople</title>
    <meta name="description" content="Best Trade connects you with verified plumbers, electricians, builders and more. Get quotes from trusted local professionals across the UK.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        /* ===== NAVIGATION ===== */
        .navbar {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-tick {
            width: 32px;
            height: 32px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-links {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .nav-links a {
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            padding: 10px 16px;
            border-radius: 6px;
        }
        
        .nav-links a:hover {
            color: #1e3a5f;
            background: #f8fafc;
        }
        
        .nav-btn {
            background: #1e3a5f;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
        }
        
        /* Hero */
        .hero {
            background: #1e3a5f;
            color: white;
            padding: 100px 30px;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 800;
        }
        
        .hero p {
            font-size: 1.4rem;
            margin-bottom: 40px;
            opacity: 0.95;
        }
        
        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .btn-primary {
            background: #ef4444;
            color: white;
        }
        
        .btn-outline {
            border: 2px solid white;
            color: white;
        }
        
        /* Services / Trade Cards */
        .services-section {
            padding: 80px 30px;
            background: #f9fafb;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .section-header h2 {
            font-size: 2.6rem;
            color: #1e3a5f;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .service-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        
        .service-card:hover {
            transform: translateY(-8px);
        }
        
        .service-icon {
            height: 180px;
            background: linear-gradient(135deg, #1e3a5f, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            color: white;
        }
        
        .service-content {
            padding: 25px;
        }
        
        .service-content h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #1e3a5f;
        }
        
        .service-content p {
            color: #666;
            margin-bottom: 20px;
        }
        
        /* Featured Ads */
        .featured-ads {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 8px;
            border-left: 4px solid #1e3a5f;
        }
        
        .featured-ads h4 {
            margin-bottom: 10px;
            color: #1e3a5f;
            font-size: 1.05rem;
        }
        
        .ad-item {
            background: white;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        
        .ad-item:last-child {
            margin-bottom: 0;
        }
        
        .ad-name {
            font-weight: 600;
            color: #1e3a5f;
        }
        
        .ad-desc {
            font-size: 0.9rem;
            color: #666;
            margin-top: 4px;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-tick">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                </span>
                BestTrade
            </a>
            <div class="nav-links">
                <a href="/customer-post-job.html">Post a Job</a>
                <a href="/pricing.html">Pricing</a>
                <a href="/tradesperson-sign-in.html">Trade Sign In</a>
            </div>
        </div>
    </nav>
    
    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>UK's #1 Trade Marketplace</h1>
            <p>Connect with verified local tradespeople. Get quotes fast.</p>
            <div class="hero-buttons">
                <a href="/customer-post-job.html" class="btn btn-primary">Post Your Job Free</a>
                <a href="/pricing.html" class="btn btn-outline">Join as Tradesperson</a>
            </div>
        </div>
    </section>
    
    <!-- Services / Trade Cards with Featured Ads -->
    <section class="services-section">
        <div class="section-header">
            <h2>Find Trusted Trades</h2>
            <p>Click on a trade below to see available professionals</p>
        </div>
        
        <div class="services-grid" id="servicesGrid">
            <!-- Cards will be populated by JavaScript -->
        </div>
    </section>
    
    <script>
        const trades = [
            { icon: "🔧", name: "Plumbers", category: "plumber" },
            { icon: "⚡", name: "Electricians", category: "electrician" },
            { icon: "🏗️", name: "Builders", category: "builder" },
            { icon: "🪚", name: "Carpenters", category: "carpenter" },
            { icon: "🧱", name: "Plasterers", category: "plasterer" },
            { icon: "🎨", name: "Decorators", category: "painter-decorator" },
            { icon: "🧱", name: "Tilers", category: "tiler" },
            { icon: "🏠", name: "Roofers", category: "roofer" }
        ];

        async function loadFeaturedAds(category) {
            try {
                const res = await fetch(`/api/featured-ads/${category}`);
                const data = await res.json();
                if (data.ads && data.ads.length > 0) {
                    let html = `<div class="featured-ads"><h4>Featured Companies</h4>`;
                    data.ads.forEach(ad => {
                        html += `
                            <div class="ad-item">
                                <div class="ad-name">${ad.company_name}</div>
                                <div class="ad-desc">${ad.short_description}</div>
                            </div>`;
                    });
                    html += `</div>`;
                    return html;
                }
                return '';
            } catch (e) {
                return '';
            }
        }

        async function renderServices() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = '';

            for (let trade of trades) {
                const featuredHTML = await loadFeaturedAds(trade.category);
                
                const cardHTML = `
                    <div class="service-card">
                        <div class="service-icon">${trade.icon}</div>
                        <div class="service-content">
                            <h3>${trade.name}</h3>
                            <p>Find reliable local professionals</p>
                            ${featuredHTML}
                            <a href="#" class="btn" onclick="alert('Opening ${trade.name} section...')">Browse ${trade.name}</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            }
        }

        // Load services with featured ads on page load
        window.onload = renderServices;
    </script>
</body>
</html>
